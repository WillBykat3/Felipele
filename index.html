<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crackle</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --text: #1a1a1b; --tile-border: #d3d6da;
      --tile-bg: #ffffff; --correct: #6aaa64; --present: #c9b458;
      --absent: #787c7e; --key-bg: #d3d6da; --panel-bg: #ffffff;
      --icon-color: #000000;
    }
    body.dark-mode {
      --bg: #121213; --text: #ffffff; --tile-border: #3a3a3c;
      --tile-bg: #121213; --key-bg: #818384; --panel-bg: #1a1a1b;
      --icon-color: #ffffff;
    }
    body {
      background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; transition: background 0.4s ease; overflow: hidden;
    }

    #cheat-banner {
      position: fixed; top: -65px; left: 50%; transform: translateX(-50%);
      padding: 12px 40px; background: var(--correct); color: white; 
      display: flex; align-items: center; justify-content: center; 
      font-weight: 800; z-index: 9999; border-radius: 0 0 12px 12px;
      transition: top 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem;
    }
    #cheat-banner.active { top: 0; }

    .btn, .key, .choice-btn, .icon-btn { 
      cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: none; outline: none;
    }
    
    .choice-btn:hover, .btn:hover { background: #000 !important; color: #fff !important; }
    .key:hover { filter: brightness(0.8); }
    
    .icon-btn:active, .choice-btn:active, .key:active { transform: scale(0.85); }

    .spin-once { animation: spin 0.6s ease-in-out; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    header { 
      width: 100%; max-width: 500px; display: flex; align-items: center; 
      justify-content: space-between; padding: 15px; 
      border-bottom: 1px solid var(--tile-border); margin-bottom: 10px;
    }
    header h1 { font-family: 'Archivo Black', sans-serif; font-size: 1.4rem; font-weight: 900; }
    .header-controls { display: flex; gap: 15px; }
    .icon-btn { background: none; display: flex; align-items: center; justify-content: center; padding: 5px; }
    .icon-btn svg { fill: var(--icon-color); width: 22px; height: 22px; transition: fill 0.3s; }

    #selection-overlay {
      display: flex; position: fixed; inset: 0; background: var(--bg);
      z-index: 5000; align-items: center; justify-content: center; text-align: center;
    }
    .choice-group { display: flex; flex-direction: column; gap: 12px; width: 280px; align-items: center; }
    .choice-btn {
      width: 100%; background: none; border: 2px solid var(--tile-border); color: var(--text);
      padding: 18px; font-family: 'Archivo Black', sans-serif; text-transform: uppercase;
      border-radius: 8px; font-size: 1.1rem;
    }

    #board { display: grid; gap: 5px; margin: 20px 0; perspective: 1000px; }
    .tile {
      width: 58px; height: 58px; border: 2px solid var(--tile-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 700; text-transform: uppercase;
      transition: border-color 0.2s; backface-visibility: hidden;
    }
    .tile.filled { border-color: #878a8c; transform: scale(1.05); }
    
    .reveal { animation: flipTile 0.6s forwards; }
    @keyframes flipTile {
      0% { transform: rotateX(0); }
      50% { transform: rotateX(90deg); }
      100% { transform: rotateX(0); }
    }

    .correct { background: var(--correct) !important; color: white !important; border-color: var(--correct) !important; }
    .present { background: var(--present) !important; color: white !important; border-color: var(--present) !important; }
    .absent  { background: var(--absent) !important; color: white !important; border-color: var(--absent) !important; }

    #keyboard { width: 100%; max-width: 500px; padding: 0 8px 25px 8px; margin-top: auto; }
    .key-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
    .key { 
      height: 58px; border-radius: 4px; background: var(--key-bg); 
      color: var(--text); font-weight: 700; flex: 1; 
      display: flex; align-items: center; justify-content: center;
    }
    .key.wide { flex: 1.5; font-size: 0.75rem; }

    .modal-overlay { 
      display: none; position: fixed; inset: 0; 
      background: rgba(0,0,0,0.7); z-index: 6000; 
      align-items: center; justify-content: center; backdrop-filter: blur(4px);
    }
    .modal-content { 
      background: var(--panel-bg); padding: 30px; border-radius: 12px; 
      width: 90%; max-width: 400px; text-align: center; color: var(--text);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .input-box {
      width: 100%; padding: 12px; margin: 10px 0; 
      background: var(--bg); border: 1px solid var(--tile-border); 
      color: var(--text); border-radius: 6px;
    }
    #word-list { max-height: 200px; overflow-y: auto; text-align: left; margin: 15px 0; border: 1px solid var(--tile-border); border-radius: 6px; }
    .word-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--tile-border); font-weight: 600; }
    .item-actions { display: flex; gap: 10px; }
    .action-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; padding: 5px; }
    .action-btn svg { width: 16px; height: 16px; }
    
    .add-btn-small {
      height: 40px;
      padding: 0 15px;
      border-radius: 6px;
      background: var(--correct);
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div id="cheat-banner"></div>

  <div id="selection-overlay">
    <div class="selection-card">
      <h2 style="margin-bottom:25px; letter-spacing:3px; font-size:1.1rem; font-family:'Archivo Black';">CHOOSE GAME</h2>
      <div class="choice-group">
        <button class="choice-btn" onclick="selectGame('cruzdle')">Cruzdle</button>
        <button class="choice-btn" onclick="selectGame('maxxle')">Maxxle</button>
      </div>
    </div>
  </div>

  <header>
    <h1 id="game-title">CRACKLE</h1>
    <div class="header-controls">
      <button class="icon-btn" onclick="animateSwitch(this)" title="Switch">
        <svg id="switch-icon" viewBox="0 0 24 24">
          <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
        </svg>
      </button>
      <button class="icon-btn" id="theme-toggle" title="Theme">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18l-.01-16c4.41 0 8 3.59 8 8s-3.59 8-8 8z"/></svg>
      </button>
      <button class="icon-btn" id="edit-btn" title="Edit">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
    </div>
  </header>

  <div id="board"></div>

  <div id="keyboard">
    <div class="key-row" id="row1"></div>
    <div class="key-row" id="row2"></div>
    <div class="key-row" id="row3"></div>
  </div>

  <div id="admin-overlay" class="modal-overlay">
    <div class="modal-content">
      <div id="admin-login">
        <h3>ADMIN ACCESS</h3>
        <input type="password" id="admin-pass" class="input-box" placeholder="Password">
        <button class="choice-btn" style="width:100%; margin-top:10px" onclick="checkPass()">ENTER</button>
        <button class="btn" style="margin-top:15px; background:none; color:var(--text)" onclick="closeModal('admin-overlay')">CANCEL</button>
      </div>
      <div id="admin-editor" style="display:none">
        <h3 id="edit-title">EDIT LISTS</h3>
        <div style="display:flex; gap:8px; align-items: center; margin-top: 10px;">
            <input type="text" id="new-word" class="input-box" placeholder="Add name..." maxlength="12" style="margin:0;">
            <button class="btn add-btn-small" onclick="addWord()">ADD</button>
        </div>
        <div id="word-list"></div>
        <div style="display:flex; gap:10px;">
          <button class="choice-btn" style="flex:1; background: #787c7e; color: white; border: none;" onclick="resetWords()">RESET</button>
          <button class="choice-btn" style="flex:1" onclick="closeModal('admin-overlay')">DONE</button>
        </div>
      </div>
    </div>
  </div>

  <div id="game-modal" class="modal-overlay">
    <div class="modal-content">
      <h2 id="modal-title" style="font-family:'Archivo Black'; font-size: 2rem; color: var(--correct);">Congrats!</h2>
      <p id="modal-msg" style="margin: 20px 0; font-size: 1.1rem;"></p>
      <button class="choice-btn" style="width:100%; background:var(--correct); color:white; border:none" onclick="closeModal('game-modal')">SEE RESULTS</button>
    </div>
  </div>

  <script>
    const DEFAULTS = {
      cruzdle: ["JOEY", "AMZIE", "BAILEY", "WAND", "CAT", "SOPHIA", "MAYA", "TAYLOR", "MIA", "LILLY", "DAVIS", "AMARA", "BREE", "JENNA", "IZZY"],
      maxxle: ["MAYA", "CAM", "DANI", "LIZ", "HANSEN", "LUCY", "VIVIENNE", "GEORGIA", "SASHA", "CAROLINE", "LYDIA", "RANDOM"]
    };
    let activeGame, WORDS, answer, wordLen, currentRow, currentGuess, gameOver;
    let inputHistory = "";

    function animateSwitch(btn) {
      const svg = btn.querySelector('svg');
      svg.classList.add('spin-once');
      setTimeout(() => { resetApp(); }, 300);
      setTimeout(() => { svg.classList.remove('spin-once'); }, 600);
    }

    function selectGame(choice) {
      activeGame = choice;
      document.getElementById('selection-overlay').style.display = 'none';
      const capitalized = choice.charAt(0).toUpperCase() + choice.slice(1);
      document.title = `Crackle | ${capitalized}`;
      initGame();
    }

    function resetApp() { 
      document.getElementById('selection-overlay').style.display = 'flex'; 
      document.title = "Crackle";
      document.getElementById('game-title').textContent = "CRACKLE";
      document.getElementById('game-title').style.textAlign = "center";
    }

    function initGame() {
      const savedWords = localStorage.getItem(`words_${activeGame}`);
      WORDS = savedWords ? JSON.parse(savedWords) : [...DEFAULTS[activeGame]];
      
      // Top Left Bold Gamemode
      const titleEl = document.getElementById('game-title');
      titleEl.textContent = activeGame.toUpperCase();
      titleEl.parentElement.style.justifyContent = "space-between";
      titleEl.style.margin = "0";

      // Daily seed logic for word selection
      const now = new Date();
      const dateString = now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate();
      const dateSeed = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
      
      const wordIndex = dateSeed % WORDS.length;
      answer = WORDS[wordIndex].toUpperCase();
      wordLen = answer.length;
      
      // Load or Reset Progress based on date
      const progressKey = `progress_${activeGame}`;
      const savedProgress = JSON.parse(localStorage.getItem(progressKey));
      
      if (savedProgress && savedProgress.date === dateString) {
        currentRow = savedProgress.currentRow;
        currentGuess = "";
        gameOver = savedProgress.gameOver;
        renderSavedBoard(savedProgress.guesses);
        if (gameOver) endGame(savedProgress.won, true);
      } else {
        currentRow = 0;
        currentGuess = "";
        gameOver = false;
        localStorage.setItem(progressKey, JSON.stringify({date: dateString, guesses: [], currentRow: 0, gameOver: false, won: false}));
      }

      if (!gameOver) {
        const board = document.getElementById("board");
        board.innerHTML = "";
        board.style.gridTemplateColumns = `repeat(${wordLen}, 58px)`;
        // Only 3 guesses allowed
        for (let i = 0; i < 3 * wordLen; i++) {
          const div = document.createElement("div");
          div.className = "tile"; div.id = `tile-${Math.floor(i/wordLen)}-${i%wordLen}`;
          board.appendChild(div);
        }
        buildKeyboard();
      }
    }

    function renderSavedBoard(guesses) {
      const board = document.getElementById("board");
      board.innerHTML = "";
      board.style.gridTemplateColumns = `repeat(${wordLen}, 58px)`;
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < wordLen; c++) {
          const div = document.createElement("div");
          div.className = "tile";
          div.id = `tile-${r}-${c}`;
          if (guesses[r]) {
            div.textContent = guesses[r].word[c];
            div.classList.add(guesses[r].result[c]);
          }
          board.appendChild(div);
        }
      }
      buildKeyboard();
      // Color keys based on history
      guesses.forEach(g => {
        g.word.split('').forEach((letter, i) => {
          const keyBtn = document.getElementById(`key-${letter}`);
          if (keyBtn && !keyBtn.classList.contains('correct')) {
            keyBtn.classList.remove('present', 'absent');
            keyBtn.classList.add(g.result[i]);
          }
        });
      });
    }

    function buildKeyboard() {
      const layout = ["QWERTYUIOP".split(""), "ASDFGHJKL".split(""), ["ENTER", ..."ZXCVBNM".split(""), "⌫"]];
      ["row1", "row2", "row3"].forEach((id, idx) => {
        const row = document.getElementById(id); row.innerHTML = "";
        layout[idx].forEach(k => {
          const btn = document.createElement("button");
          btn.textContent = k; btn.className = "key" + (k.length > 1 ? " wide" : "");
          btn.id = `key-${k}`; btn.onclick = () => handleInput(k);
          row.appendChild(btn);
        });
      });
    }

    function handleInput(key) {
      if (gameOver) return;
      inputHistory += key;
      if (inputHistory.endsWith("ACE3")) { triggerCheat(); inputHistory = ""; return; }

      if (key === "ENTER") {
        if (currentGuess.length === wordLen) submitGuess();
      } else if (key === "⌫" || key === "BACKSPACE") {
        if (currentGuess.length > 0) {
          currentGuess = currentGuess.slice(0, -1);
          const tile = document.getElementById(`tile-${currentRow}-${currentGuess.length}`);
          tile.textContent = ""; tile.classList.remove("filled");
        }
      } else if (currentGuess.length < wordLen && /^[A-Z]$/.test(key)) {
        const tile = document.getElementById(`tile-${currentRow}-${currentGuess.length}`);
        tile.textContent = key; tile.classList.add("filled");
        currentGuess += key;
      }
    }

    function triggerCheat() {
        const banner = document.getElementById('cheat-banner');
        banner.textContent = answer; banner.classList.add('active');
        setTimeout(() => banner.classList.remove('active'), 3000);
    }

    function submitGuess() {
      const result = Array(wordLen).fill("absent"), ansArr = answer.split(""), guessArr = currentGuess.split("");
      guessArr.forEach((l, i) => { if (l === ansArr[i]) { result[i] = "correct"; ansArr[i] = null; } });
      guessArr.forEach((l, i) => { if (result[i] === "absent" && ansArr.includes(l)) { result[i] = "present"; ansArr[ansArr.indexOf(l)] = null; } });

      const progressKey = `progress_${activeGame}`;
      const progress = JSON.parse(localStorage.getItem(progressKey));
      progress.guesses.push({word: currentGuess, result: result});

      result.forEach((status, i) => {
        const tile = document.getElementById(`tile-${currentRow}-${i}`);
        const letter = guessArr[i];
        setTimeout(() => {
          tile.classList.add('reveal');
          setTimeout(() => {
            tile.classList.add(status);
            const keyBtn = document.getElementById(`key-${letter}`);
            if (keyBtn && !keyBtn.classList.contains('correct')) {
              keyBtn.classList.remove('present', 'absent'); 
              keyBtn.classList.add(status);
            }
          }, 300);
        }, i * 150);
      });

      const winDelay = (wordLen * 150) + 600;
      if (currentGuess === answer) {
        progress.gameOver = true; progress.won = true;
        localStorage.setItem(progressKey, JSON.stringify(progress));
        setTimeout(() => endGame(true), winDelay);
      } else if (currentRow === 2) { // Max 3 guesses (0, 1, 2)
        progress.gameOver = true; progress.won = false;
        localStorage.setItem(progressKey, JSON.stringify(progress));
        setTimeout(() => endGame(false), winDelay);
      } else { 
        currentRow++; currentGuess = ""; 
        progress.currentRow = currentRow;
        localStorage.setItem(progressKey, JSON.stringify(progress));
      }
    }

    function endGame(win, silent = false) {
      gameOver = true;
      const modalTitle = document.getElementById('modal-title');
      const modalMsg = document.getElementById('modal-msg');
      if (win) {
        modalTitle.textContent = "Congrats!";
        modalTitle.style.color = "var(--correct)";
        modalMsg.textContent = "Come back tomorrow for more.";
      } else {
        modalTitle.textContent = "Next Time";
        modalTitle.style.color = "var(--absent)";
        modalMsg.textContent = `The word was ${answer}`;
      }
      if (!silent) document.getElementById('game-modal').style.display = 'flex';
    }

    function checkPass() {
      if(document.getElementById('admin-pass').value === "Lucky") {
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-editor').style.display = 'block';
        renderList();
      }
    }
    function renderList() {
      const list = document.getElementById('word-list'); list.innerHTML = "";
      WORDS.forEach((w, index) => {
        const div = document.createElement('div'); div.className = "word-item";
        div.innerHTML = `<span>${w}</span><div class="item-actions"><button class="action-btn" onclick="editWord(${index})"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button><button class="action-btn" onclick="delWord('${w}')"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button></div>`;
        list.appendChild(div);
      });
    }
    function addWord() {
      const inp = document.getElementById('new-word'); const val = inp.value.toUpperCase().trim();
      if(val && !WORDS.includes(val)) { WORDS.push(val); inp.value = ""; save(); }
    }
    function delWord(w) { WORDS = WORDS.filter(x => x !== w); save(); }
    function editWord(index) {
      const newVal = prompt("Edit name:", WORDS[index]);
      if (newVal && newVal.trim() !== "") { WORDS[index] = newVal.toUpperCase().trim(); save(); }
    }
    function resetWords() { if(confirm("Restore names?")) { WORDS = [...DEFAULTS[activeGame]]; save(); } }
    function save() { localStorage.setItem(`words_${activeGame}`, JSON.stringify(WORDS)); renderList(); initGame(); }
    function closeModal(id) { 
        document.getElementById(id).style.display = 'none'; 
        document.getElementById('admin-login').style.display = 'block';
        document.getElementById('admin-editor').style.display = 'none';
        document.getElementById('admin-pass').value = "";
    }

    document.getElementById('edit-btn').onclick = () => document.getElementById('admin-overlay').style.display = 'flex';
    document.getElementById('theme-toggle').onclick = () => document.body.classList.toggle('dark-mode');
    
    window.addEventListener("keydown", (e) => {
      if(document.activeElement.tagName === "INPUT") return;
      const k = e.key.toUpperCase();
      if(k === "BACKSPACE") handleInput("⌫"); else if(k === "ENTER" || /^[A-Z3]$/.test(k)) handleInput(k);
    });
  </script>
</body>
</html>
