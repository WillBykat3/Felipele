<!DOCTYPE html>
<html>
<head>
    <title>Cruzdle</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; }
        #board { margin: 20px; }
        .row { display: flex; justify-content: center; margin: 5px; font-size: 2em; font-weight: bold; min-height: 60px; }
        .tile { width: 60px; height: 60px; margin: 2px; display: flex; align-items: center; justify-content: center; border: 2px solid #ccc; background: white; }
        .green { background: #6aaa64; color: white; }
        .yellow { background: #c9b458; color: white; }
        .gray { background: #787c7e; color: white; }
        #keyboard { margin: 20px; }
        .keyrow { display: flex; justify-content: center; margin: 5px; }
        .key { min-width: 40px; height: 50px; margin: 2px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; background: #d3d6da; color: black; }
        .key.green { background: #6aaa64; color: white; }
        .key.yellow { background: #c9b458; color: white; }
        .key.gray { background: #787c7e; color: white; }
        .key.wide { flex: 1; min-width: 60px; font-size: 0.8em; }
        #message { font-size: 1.2em; margin: 10px; }
        input { display: none; }
    </style>
</head>
<body>
    <h1>🟥🟨⬜ CRUZDLE</h1>
    <p>6 tries to guess the name!</p>
    <div id="board"></div>
    <div id="message">Click keys or type to guess.</div>
    <div id="keyboard">
        <div class="keyrow">
            <button class="key" data-key="Q">Q</button><button class="key" data-key="W">W</button><button class="key" data-key="E">E</button><button class="key" data-key="R">R</button><button class="key" data-key="T">T</button><button class="key" data-key="Y">Y</button><button class="key" data-key="U">U</button><button class="key" data-key="I">I</button><button class="key" data-key="O">O</button><button class="key" data-key="P">P</button>
        </div>
        <div class="keyrow">
            <button class="key" data-key="A">A</button><button class="key" data-key="S">S</button><button class="key" data-key="D">D</button><button class="key" data-key="F">F</button><button class="key" data-key="G">G</button><button class="key" data-key="H">H</button><button class="key" data-key="J">J</button><button class="key" data-key="K">K</button><button class="key" data-key="L">L</button>
        </div>
        <div class="keyrow">
            <button class="key wide" data-key="ENTER">ENTER</button>
            <button class="key" data-key="Z">Z</button><button class="key" data-key="X">X</button><button class="key" data-key="C">C</button><button class="key" data-key="V">V</button><button class="key" data-key="B">B</button><button class="key" data-key="N">N</button><button class="key" data-key="M">M</button>
            <button class="key wide" data-key="BACK">⌫</button>
        </div>
    </div>

    <script>
        const answers = ['Joey', 'Amzie', 'Bailey', 'Wand', 'Cat', 'Sophia', 'Maya', 'Taylor', 'Mia'];
        let secretWord = answers[Math.floor(Math.random() * answers.length)].toUpperCase();
        const maxTries = 6;
        let currentRow = 0;
        let currentCol = 0;
        let gameOver = false;
        let won = false;

        const board = document.getElementById('board');
        const message = document.getElementById('message');

        // Create board
        for (let i = 0; i < maxTries; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < secretWord.length; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                row.appendChild(tile);
            }
            board.appendChild(row);
        }

        const rows = board.querySelectorAll('.row');
        const keyColors = {};

        // Keyboard click handlers
        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('click', () => {
                handleKey(key.dataset.key);
            });
        });

        // Typing support
        document.addEventListener('keydown', (e) => {
            if (gameOver) return;
            if (e.key.length === 1 && e.key.match(/[A-Z]/i)) {
                handleKey(e.key.toUpperCase());
            } else if (e.key === 'Enter') {
                handleKey('ENTER');
            } else if (e.key === 'Backspace') {
                handleKey('BACK');
            }
        });

        function handleKey(key) {
            if (gameOver) return;

            if (key === 'ENTER') {
                if (currentCol === secretWord.length) {
                    const guess = getCurrentGuess();
                    if (isValidWord(guess)) {  // Always valid since list-based
                        updateBoard(guess);
                        currentRow++;
                        currentCol = 0;
                        if (guess === secretWord) {
                            won = true;
                            gameOver = true;
                            message.textContent = `You won! 🎉 The word was ${secretWord}`;
                        } else if (currentRow === maxTries) {
                            gameOver = true;
                            message.textContent = `Game over! The word was ${secretWord}`;
                        } else {
                            message.textContent = 'Next guess...';
                        }
                    } else {
                        message.textContent = `Not a valid name! (${secretWord.length} letters)`;
                        setTimeout(() => { message.textContent = 'Try again.'; }, 1000);
                    }
                }
            } else if (key === 'BACK') {
                if (currentCol > 0) {
                    currentCol--;
                    rows[currentRow].children[currentCol].textContent = '';
                    rows[currentRow].children[currentCol].className = 'tile';
                }
            } else if (/^[A-Z]$/.test(key) && currentCol < secretWord.length) {
                rows[currentRow].children[currentCol].textContent = key;
                currentCol++;
            }
        }

        function getCurrentGuess() {
            let guess = '';
            for (let i = 0; i < secretWord.length; i++) {
                guess += rows[currentRow].children[i].textContent;
            }
            return guess;
        }

        function isValidWord(guess) {
            return guess.length === secretWord.length;
        }

        function updateBoard(guess) {
            const rowTiles = rows[currentRow].children;

            // Update keyboard colors
            const secretCount = {};
            for (let char of secretWord) {
                secretCount[char] = (secretCount[char] || 0) + 1;
            }

            for (let i = 0; i < guess.length; i++) {
                const char = guess[i];
                const tile = rowTiles[i];

                if (char === secretWord[i]) {
                    tile.className = 'tile green';
                    secretCount[char]--;
                    setKeyColor(char, 'green');
                }
            }

            for (let i = 0; i < guess.length; i++) {
                const char = guess[i];
                const tile = rowTiles[i];
                if (tile.className !== 'tile green' && secretCount[char] > 0) {
                    tile.className = 'tile yellow';
                    secretCount[char]--;
                    setKeyColor(char, 'yellow');
                } else if (tile.className === 'tile') {
                    tile.className = 'tile gray';
                    setKeyColor(char, 'gray');
                }
            }
        }

        function setKeyColor(char, color) {
            if (keyColors[char] === 'green') return;
            keyColors[char] = color;
            document.querySelectorAll(`[data-key="${char}"]`).forEach(k => {
                k.className = `key ${color}`;
            });
        }
    </script>
</body>
</html>
