<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Feliple</title>
<style>
  :root { --bg:#121213; --fg:#eaeaea; --tile:#3a3a3c; --border:#565758; --green:#538d4e; --yellow:#b59f3b; --key:#818384; }
  body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--fg); display:flex; min-height:100vh; align-items:center; justify-content:center; }
  .app { width:min(100%, 420px); padding:16px; box-sizing:border-box; }
  h1 { margin:0 0 8px; font-size:28px; text-align:center; letter-spacing:.05em; }
  .sub { text-align:center; color:#b5b5b5; margin-bottom:14px; font-size:14px; }
  .board { display:grid; grid-template-rows: repeat(6, 1fr); gap:6px; margin:0 auto 16px; width:100%; aspect-ratio: 1 / 1.2; }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap:6px; }
  .tile { border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; text-transform:uppercase; user-select:none; background:transparent; }
  .filled { border-color:#878a8c; }
  .correct { background:var(--green); border-color:var(--green); color:white; }
  .present { background:var(--yellow); border-color:var(--yellow); color:white; }
  .absent { background:#3a3a3c; border-color:#3a3a3c; color:white; }
  .keyboard { display:grid; gap:8px; }
  .keyrow { display:flex; gap:6px; justify-content:center; }
  button.key { border:0; border-radius:6px; padding:14px 10px; min-width:32px; background:var(--key); color:white; font-weight:700; cursor:pointer; text-transform:uppercase; }
  button.key.wide { min-width:56px; }
  button.key:active { transform:translateY(1px); }
  .msg { min-height:24px; text-align:center; margin:10px 0 12px; color:#d7d7d7; }
  .footer { text-align:center; margin-top:12px; color:#9aa0a6; font-size:13px; }
</style>
</head>
<body>
<div class="app">
  <h1>FELIPLE</h1>
  <div class="sub">Guess today's name in 6 tries</div>
  <div id="board" class="board"></div>
  <div id="msg" class="msg"></div>
  <div id="keyboard" class="keyboard"></div>
  <div class="footer">Today's name changes every day</div>
</div>
<script>
const WORDS = ['JOEY','AMZIE','BAILEY','WAND','CAT','SOPHIA','MAYA','TAYLOR','MIA'];
const todayIndex = Math.floor((new Date().setHours(0,0,0,0) / 86400000)) % WORDS.length;
let answer = WORDS[todayIndex];
let row = 0, col = 0, over = false;
const board = document.getElementById('board');
const msg = document.getElementById('msg');
const keyboard = document.getElementById('keyboard');
const rows = [];
function makeBoard(){
  for(let r=0;r<6;r++){
    const rowEl = document.createElement('div'); rowEl.className='row';
    const tiles=[];
    for(let c=0;c<5;c++){
      const t = document.createElement('div'); t.className='tile'; rowEl.appendChild(t); tiles.push(t);
    }
    board.appendChild(rowEl); rows.push(tiles);
  }
}
function makeKeyboard(){
  const layout = ['QWERTYUIOP','ASDFGHJKL','ENTERZXCVBNM⌫'];
  layout.forEach(line=>{
    const rowEl = document.createElement('div'); rowEl.className='keyrow';
    [...line].forEach(ch=>{
      const b = document.createElement('button');
      b.className='key' + (ch==='ENTER'||ch==='⌫' ? ' wide':'');
      b.textContent = ch==='⌫' ? '⌫' : ch;
      b.onclick = ()=>handleKey(ch);
      rowEl.appendChild(b);
    });
    keyboard.appendChild(rowEl);
  });
}
function setMsg(t){ msg.textContent = t || ''; }
function handleKey(key){
  if(over) return;
  if(key==='ENTER') return submit();
  if(key==='⌫') return backspace();
  if(/^[A-Z]$/.test(key)) addLetter(key);
}
function addLetter(ch){ if(col<5){ rows[row][col].textContent=ch; rows[row][col].classList.add('filled'); col++; } }
function backspace(){ if(col>0){ col--; rows[row][col].textContent=''; rows[row][col].classList.remove('filled'); } }
function scoreGuess(guess){
  const res = Array(5).fill('absent');
  const remaining = answer.split('');
  for(let i=0;i<5;i++) if(guess[i]===answer[i]){ res[i]='correct'; remaining[i]=null; }
  for(let i=0;i<5;i++) if(res[i]==='absent'){ const idx = remaining.indexOf(guess[i]); if(idx>-1){ res[i]='present'; remaining[idx]=null; } }
  return res;
}
function paintRow(guess){
  const res = scoreGuess(guess);
  res.forEach((s,i)=> rows[row][i].classList.add(s));
}
function submit(){
  if(col<5) return setMsg('Not enough letters');
  const guess = rows[row].map(t=>t.textContent).join('');
  if(!WORDS.includes(guess)) return setMsg('Not in word list');
  paintRow(guess);
  if(guess===answer){ over=true; return setMsg('You won! The word was ' + answer); }
  row++; col=0;
  if(row===6){ over=true; setMsg('Game over. The word was ' + answer); }
  else setMsg('');
}
document.addEventListener('keydown', e=>{
  if(e.key==='Enter') handleKey('ENTER');
  else if(e.key==='Backspace') handleKey('⌫');
  else handleKey(e.key.toUpperCase());
});
makeBoard(); makeKeyboard();
</script>
</body>
</html>
